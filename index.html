<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Owen Space Mission</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="game">
  <header>
    <h1>🚀 Owen Space Mission</h1>
    <div id="stats">⭐ <span id="score">0</span> | 🎓 <span id="levelName">Step 1</span></div>
  </header>

  <main>
    <section id="spaceView">
      <div id="starsLayer"></div>
      <div id="sun"></div>
      <div id="rocket">🚀</div>
      <div id="planetDisplay"></div>
      <div id="obstacle"></div>
      <div id="countdown"></div>
    </section>

    <section id="panel">
      <div id="levelButtons">
        <button data-level="1">Step 1<br>한 자리</button>
        <button data-level="2">Step 2<br>두 자리</button>
        <button data-level="3">Step 3<br>세 자리</button>
      </div>

      <h2 id="missionTitle">행성을 선택하세요</h2>
      <div id="message">한 자리부터 시작해서 세 자리 덧셈·뺄셈까지 마스터해요!</div>

      <div id="planetButtons"></div>

      <div id="fuelGame" class="box hidden">
        <div id="fuelTarget"></div>
        <div id="selectedFormula">? + ? = ?</div>
        <div id="numberCards"></div>
        <div class="twoButtons">
          <button id="plusBtn">➕ 더하기</button>
          <button id="minusBtn">➖ 빼기</button>
        </div>
        <button id="launchBtn">🚀 발사하기</button>
      </div>

      <div id="spaceQuiz" class="box hidden">
        <h3 id="quizTitle">우주 장애물!</h3>
        <div id="quizQuestion"></div>
        <div id="quizAnswers"></div>
      </div>

      <div id="stickerBook" class="box">
        <h3>🌌 행성 도감</h3>
        <div id="stickers"></div>
      </div>

      <div id="planetFact" class="box hidden">
        <h3 id="factTitle"></h3>
        <p id="factText"></p>
      </div>
    </section>
  </main>
</div>

<script src="script.js"></script>
</body>
</html>
